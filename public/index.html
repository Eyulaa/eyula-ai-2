<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyula AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0B0E;
    --panel: #131316;
    --text: #EDEDF0;
    --text-dim: #83838C;
    --border: #232328;
    --accent: #6E6EF7;
    --accent-dark: #5A5AE0;
    --accent-light: #1C1C2E;
    --user-bubble: #6E6EF7;
    --ai-bubble: #1B1B20;
    --radius: 14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter', system-ui, sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(110,110,247,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 100%, rgba(110,110,247,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    min-height:100%;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px;
    background:rgba(19,19,22,0.6);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }

  .logo{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .logo-mark{
    width:32px;
    height:32px;
    border-radius:9px;
    background:linear-gradient(135deg, var(--accent), #8C8CFA);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:700;
    font-size:15px;
  }

  .logo-text{
    font-weight:700;
    font-size:17px;
    letter-spacing:-0.01em;
  }

  .status{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    color:var(--text-dim);
  }
  .status .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#22C55E;
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    padding:0 16px;
  }

  .chat-container{
    width:100%;
    max-width:720px;
    flex:1;
    display:flex;
    flex-direction:column;
    padding-top:20px;
  }

  .transcript{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:16px;
    padding-bottom:20px;
    min-height:340px;
  }

  .empty{
    margin:auto;
    text-align:center;
    max-width:420px;
    padding:40px 20px;
  }
  .empty .logo-mark{
    width:52px;
    height:52px;
    border-radius:14px;
    font-size:22px;
    margin:0 auto 16px;
  }
  .empty h2{
    font-size:20px;
    font-weight:700;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .empty p{
    font-size:14px;
    color:var(--text-dim);
    line-height:1.5;
    margin:0 0 20px;
  }
  .suggestions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .suggestion{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .suggestion:hover{
    border-color:var(--accent);
    background:var(--accent-light);
    box-shadow:0 0 0 1px rgba(110,110,247,0.25), 0 0 20px rgba(110,110,247,0.12);
  }

  .row{
    display:flex;
    gap:10px;
    max-width:88%;
    animation:rise 0.2s ease-out;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }

  .row.me{align-self:flex-end; flex-direction:row-reverse;}
  .row.ai{align-self:flex-start;}

  .avatar{
    width:28px;
    height:28px;
    border-radius:8px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    color:white;
  }
  .row.ai .avatar{background:linear-gradient(135deg, var(--accent), #8C8CFA);}
  .row.me .avatar{background:#2B2B33;}

  .bubble{
    font-size:14.5px;
    line-height:1.55;
    padding:11px 15px;
    border-radius:var(--radius);
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .row.me .bubble{
    background:var(--user-bubble);
    color:white;
    border-top-right-radius:4px;
  }
  .row.ai .bubble{
    background:var(--ai-bubble);
    color:var(--text);
    border-top-left-radius:4px;
  }

  .typing{
    display:inline-flex;
    gap:4px;
    padding:3px 2px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--text-dim);
    animation:blink 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes blink{
    0%,80%,100%{opacity:0.3; transform:translateY(0);}
    40%{opacity:1; transform:translateY(-2px);}
  }

  form{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:8px 8px 8px 16px;
    margin:16px 0 24px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(110,110,247,0.02);
  }

  input[type=text]{
    flex:1;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:14.5px;
    color:var(--text);
    outline:none;
    padding:8px 0;
  }
  input[type=text]::placeholder{color:var(--text-dim);}

  button{
    background:var(--accent);
    border:none;
    color:white;
    font-family:inherit;
    font-weight:600;
    font-size:13.5px;
    padding:10px 18px;
    border-radius:11px;
    cursor:pointer;
    transition:background 0.15s;
    white-space:nowrap;
  }
  button:hover:not(:disabled){background:var(--accent-dark);}
  button:disabled{opacity:0.4; cursor:default;}
  button:focus-visible, input:focus-visible, .suggestion:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--text-dim);
    padding-bottom:18px;
  }
</style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">E</div>
      <div class="logo-text">Eyula AI</div>
    </div>
    <div class="status"><span class="dot"></span> Online</div>
  </header>

  <main>
    <div class="chat-container">
      <div class="transcript" id="transcript">
        <div class="empty" id="emptyState">
          <div class="logo-mark">E</div>
          <h2>Hi, I'm Eyula AI</h2>
          <p>Ask me anything — I can help with writing, questions, brainstorming, and more.</p>
          <div class="suggestions">
            <button type="button" class="suggestion" data-text="What can you help me with?">What can you help me with?</button>
            <button type="button" class="suggestion" data-text="Give me a fun fact.">Give me a fun fact</button>
            <button type="button" class="suggestion" data-text="Help me write an email.">Help me write an email</button>
          </div>
        </div>
      </div>

      <form id="chatForm">
        <input type="text" id="input" placeholder="Message Eyula AI…" autocomplete="off" />
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </div>
  </main>

  <footer>Eyula AI can make mistakes. Conversations are not saved after you close this page.</footer>

<script>
  const transcript = document.getElementById('transcript');
  const emptyState = document.getElementById('emptyState');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  let history = [];

  function addRow(role, text){
    if(emptyState) emptyState.remove();
    const row = document.createElement('div');
    row.className = 'row ' + (role === 'user' ? 'me' : 'ai');
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'Y' : 'E';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(avatar);
    row.appendChild(bubble);
    transcript.appendChild(row);
    transcript.scrollTop = transcript.scrollHeight;
    return bubble;
  }

  function addTyping(){
    if(emptyState) emptyState.remove();
    const row = document.createElement('div');
    row.className = 'row ai';
    row.id = 'typingRow';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'E';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    transcript.appendChild(row);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function removeTyping(){
    const row = document.getElementById('typingRow');
    if(row) row.remove();
  }

  async function sendMessage(text){
    history.push({ role: 'user', content: text });
    addRow('user', text);
    input.value = '';
    sendBtn.disabled = true;
    addTyping();

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        addRow('assistant', "Something went wrong: " + data.error);
        return;
      }

      const reply = data.reply || "Something went wrong. Please try again.";

      history.push({ role: 'assistant', content: reply });
      addRow('assistant', reply);
    } catch (err) {
      removeTyping();
      addRow('assistant', "Connection error. Please try again.");
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if(!text) return;
    sendMessage(text);
  });

  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      sendMessage(btn.dataset.text);
    });
  });

  input.focus();
</script>
</body>
</html>
